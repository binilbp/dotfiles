# BEGIN_KITTY_FONTS
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 	 15
# END_KITTY_FONTS


# BEGIN_KITTY_THEME
# Night Owl
include current-theme.conf
# END_KITTY_THEME

#CURSOR
cursor_trail 3
cursor_trail_decay 0.1 0.2

#REFRESH SPEED
sync_to_monitor yes

#WIDOW_CLOSE_CONFIRMATION
confirm_os_window_close 0
